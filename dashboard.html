<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página Inicial - Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

  <!-- Conteúdo só é preenchido depois que dashboard.js confirmar a sessão com o servidor -->
  <main class="dashboard-card">
    <h1 class="dashboard-title">BEM-VINDO(A)!</h1>
    <p class="dashboard-user" id="dashboardUserName">Verificando sua sessão...</p>
    <p class="dashboard-email" id="dashboardUserEmail"></p>
    <button type="button" class="btn btn-primary" id="logoutBtn">Sair</button>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
